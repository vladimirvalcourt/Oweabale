name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  node:
    name: Lint + Typecheck + Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install
        run: npm ci

      - name: Edge auth gate (verify_jwt=false must have in-code auth)
        run: npm run security:edge-auth-gate

      - name: Edge log hygiene (no sensitive logging)
        run: npm run security:edge-log-hygiene

      - name: Edge error leakage checks
        run: npm run security:edge-error-leakage

      - name: Edge baseline hardening checks
        run: npm run security:edge-baseline

      - name: Edge CORS hardening checks
        run: npm run security:edge-cors

      - name: Supabase migration RLS gate
        run: npm run security:migrations-rls

      - name: Security readiness gate
        run: npm run security:readiness

      - name: Lint (tsc + eslint)
        run: npm run lint

      - name: Tests
        run: npm test -- --reporter=default

      - name: Build
        run: npm run build

      - name: Audit (high + critical)
        run: npm audit --omit=dev --audit-level=high

  deno:
    name: Edge Functions (deno check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Deno
        uses: denoland/setup-deno@v1
        with:
          deno-version: v1.x

      - name: Type-check edge functions
        run: |
          shopt -s nullglob
          for f in supabase/functions/*/index.ts; do
            echo "::group::deno check $f"
            deno check --no-lock "$f" || exit 1
            echo "::endgroup::"
          done
