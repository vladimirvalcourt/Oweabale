<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#09090b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#111113;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a78bfa;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)" />

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent)" />

  <!-- Left violet bar -->
  <rect x="80" y="120" width="4" height="200" fill="url(#accent)" />

  <!-- Logo / wordmark -->
  <text x="108" y="192" font-family="system-ui, -apple-system, sans-serif" font-size="64" font-weight="500" letter-spacing="-2" fill="#fafafa">Oweable</text>

  <!-- Tagline -->
  <text x="108" y="252" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="400" fill="#a1a1aa">Financial OS for Freelancers &amp; Self-Employed</text>

  <!-- Feature pills -->
  <rect x="108" y="310" width="220" height="40" rx="6" fill="#1c1c1f" />
  <text x="128" y="336" font-family="system-ui, -apple-system, monospace" font-size="14" fill="#7c3aed">▸</text>
  <text x="148" y="336" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#a1a1aa">Quarterly Tax Tracking</text>

  <rect x="344" y="310" width="180" height="40" rx="6" fill="#1c1c1f" />
  <text x="364" y="336" font-family="system-ui, -apple-system, monospace" font-size="14" fill="#7c3aed">▸</text>
  <text x="384" y="336" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#a1a1aa">Debt Payoff Plans</text>

  <rect x="540" y="310" width="190" height="40" rx="6" fill="#1c1c1f" />
  <text x="560" y="336" font-family="system-ui, -apple-system, monospace" font-size="14" fill="#7c3aed">▸</text>
  <text x="580" y="336" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#a1a1aa">Net Worth Timeline</text>

  <rect x="746" y="310" width="160" height="40" rx="6" fill="#1c1c1f" />
  <text x="766" y="336" font-family="system-ui, -apple-system, monospace" font-size="14" fill="#7c3aed">▸</text>
  <text x="786" y="336" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#a1a1aa">Bill Management</text>

  <!-- Bottom URL -->
  <text x="108" y="560" font-family="system-ui, -apple-system, monospace" font-size="18" fill="#52525b" letter-spacing="1">oweable.com</text>
</svg>
