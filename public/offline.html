<!DOCTYPE html>
<html lang="en" style="background:#0a0a0a; color:#e5e5e5; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Oweable — You're offline</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0a0a0a;
      color: #e5e5e5;
      padding: 24px;
      gap: 32px;
    }
    .logo-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .logo-icon {
      width: 28px;
      height: 28px;
      color: #e5e5e5;
    }
    .logo-text {
      font-size: 18px;
      font-weight: 500;
      letter-spacing: -0.02em;
    }
    .card {
      max-width: 380px;
      width: 100%;
      border: 1px solid #1f1f1f;
      border-radius: 12px;
      padding: 32px 28px;
      background: #111;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }
    .icon-wrap {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      border: 1px solid #1f1f1f;
      background: #1a1a1a;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #888;
    }
    h1 {
      font-size: 16px;
      font-weight: 500;
      letter-spacing: -0.01em;
      color: #e5e5e5;
    }
    p {
      font-size: 13px;
      color: #888;
      line-height: 1.6;
    }
    button {
      margin-top: 8px;
      padding: 10px 20px;
      border-radius: 8px;
      border: 1px solid #2a2a2a;
      background: #1a1a1a;
      color: #e5e5e5;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }
    button:hover { background: #222; }
  </style>
</head>
<body>
  <div class="logo-wrap">
    <svg class="logo-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="9" />
      <circle cx="12" cy="12" r="2.5" fill="currentColor" />
    </svg>
    <span class="logo-text">Oweable</span>
  </div>

  <div class="card">
    <div class="icon-wrap">
      <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="1" y1="1" x2="23" y2="23"/><path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"/>
        <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"/>
        <path d="M10.71 5.05A16 16 0 0 1 22.56 9"/>
        <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"/>
        <path d="M8.53 16.11a6 6 0 0 1 6.95 0"/>
        <line x1="12" y1="20" x2="12.01" y2="20"/>
      </svg>
    </div>
    <h1>You're offline</h1>
    <p>Your data will sync automatically when your internet connection is restored.</p>
    <button onclick="window.location.reload()">Try again</button>
  </div>
</body>
</html>
