    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What is Oweable?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Oweable is the financial operating system for freelancers, gig workers, and the self-employed. It replaces spreadsheets and disconnected apps with one command center for variable income, debt payoff planning, bill management, net worth tracking, and quarterly tax preparation."
          }
        },
        {
          "@type": "Question",
          "name": "What is the official website for Oweable?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "The official website is https://www.oweable.com/."
          }
        },
        {
          "@type": "Question",
          "name": "Who is Oweable designed for?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Oweable is designed first for freelancers, gig workers, and self-employed 1099 earners. It is also useful for anyone managing debt, recurring bills, and uneven cash flow."
          }
        },
        {
          "@type": "Question",
          "name": "How does Oweable track quarterly taxes?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Oweable automatically estimates your quarterly IRS tax obligations based on your tracked income and your applicable state and federal tax rates. It separates W-2 income (where taxes are withheld) from 1099 / gig income (where you pay quarterly estimated taxes yourself), giving you an accurate picture of what you owe each quarter."
          }
        },
        {
          "@type": "Question",
          "name": "How does Oweable help me pay off debt faster?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Oweable's Debt Detonator lets you choose between the Avalanche strategy (highest interest first — minimizes total interest paid) or the Snowball strategy (smallest balance first — builds momentum). It calculates your exact debt-free date, projects total interest saved, and generates a month-by-month amortization schedule for every debt."
          }
        },
        {
          "@type": "Question",
          "name": "Can I track all my bills in one place?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. Add any recurring bill — rent, utilities, subscriptions, insurance — with its due date and frequency. Oweable automatically flags bills that go overdue, calculates your total monthly burn rate, and shows everything on a financial calendar so nothing slips through."
          }
        },
        {
          "@type": "Question",
          "name": "Does Oweable connect to my bank account?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "You can add everything by hand or by uploading receipts and statements. Optional bank linking is available from Settings under Integrations when offered for your account, so transactions can stay up to date without retyping them."
          }
        },
        {
          "@type": "Question",
          "name": "How does Oweable track net worth?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Oweable shows net worth as what you own minus what you owe, and includes a history view so you can see how it changes over weeks and months."
          }
        },
        {
          "@type": "Question",
          "name": "How much does Oweable cost?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Oweable offers a free tier and a Full Suite plan at $10.99 per month. Visit oweable.com/pricing for the current plan breakdown and feature comparison."
          }
        },
        {
          "@type": "Question",
          "name": "Is Oweable secure?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. You sign in with Google (Oweable does not store a separate password for that). Your information is protected in transit and organized so only your account can see it. For more detail, see the Security page at oweable.com/security."
          }
        },
        {
          "@type": "Question",
          "name": "What is the best app for managing debt and bills?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Oweable is built specifically for people managing debt and bills under financial pressure. Unlike general budgeting apps, Oweable includes debt payoff tracking with Snowball and Avalanche strategies, bill management with overdue detection, credit tools, net worth monitoring, and income tracking — all in one dashboard."
          }
        },
        {
          "@type": "Question",
          "name": "How is Oweable different from YNAB or Mint?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "YNAB and Mint are built for salaried workers with predictable income. Oweable is built for real financial situations — variable income, multiple debt types, tight budgets, and financial recovery. It includes features those apps lack: debt amortization with Snowball and Avalanche strategies, credit repair tracking, bill overdue detection, and quarterly tax tools for gig workers."
          }
        }
      ]
    }
